<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Reservation</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --success: #10B981;
            --error: #EF4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #60A5FA, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background-color: #0F172A;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .status-box {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            font-weight: 500;
        }

        .status-box.success {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-box.error {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Smart Parking</h1>
        <p class="subtitle">Reserve your spot instantly.</p>

        <form id="reservationForm">
            <div class="form-group">
                <label for="spotId">Parking Spot ID</label>
                <select id="spotId" required>
                    <option value="" disabled selected>Select a spot...</option>
                    <option value="A1">Spot A1 (Premium)</option>
                    <option value="A2">Spot A2 (Standard)</option>
                    <option value="B1">Spot B1 (EV Charging)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="userId">Your Name / User ID</label>
                <input type="text" id="userId" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="For confirmation receipt" required>
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Reserve Spot</span>
                <span class="loader" id="loader"></span>
            </button>
        </form>

        <div id="statusMessage" class="status-box"></div>
    </div>

    <script>
        document.getElementById('reservationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const spotId = document.getElementById('spotId').value;
            const userId = document.getElementById('userId').value;
            const email = document.getElementById('email').value;

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const statusMessage = document.getElementById('statusMessage');

            // Loading state
            btnText.style.display = 'none';
            loader.style.display = 'inline-block';
            submitBtn.disabled = true;
            statusMessage.className = 'status-box'; 

            try {
                // First check availability
                const availResponse = await fetch(`/api/reservations/availability/${spotId}`);
                const availData = await availResponse.json();

                if (!availData.available) {
                    throw new Error('This spot is currently occupied or unavailable.');
                }

                // If available, create reservation
                const reserveResponse = await fetch('/api/reservations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ spotId, userId, email })
                });

                const reserveData = await reserveResponse.json();

                if (reserveData.success) {
                    statusMessage.textContent = 'Success! Your reservation is confirmed. Confirmation email queued.';
                    statusMessage.classList.add('success');
                    document.getElementById('reservationForm').reset();
                } else {
                    throw new Error(reserveData.message || 'Failed to create reservation.');
                }

            } catch (error) {
                statusMessage.textContent = error.message;
                statusMessage.classList.add('error');
            } finally {
                // Reset button state
                btnText.style.display = 'inline-block';
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
